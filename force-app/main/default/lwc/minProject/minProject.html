<template>
    <lightning-card title="Upload Excel File" icon-name="utility:upload">
        <div class="slds-p-around_medium">

            <!-- Progress Bar at TOP -->
            <template if:true={isProcessing}>
                <div class="slds-m-bottom_medium">
                    <p class="slds-m-bottom_x-small">
                        <strong>{progressLabel}</strong>
                    </p>
                    <lightning-progress-bar value={progressValue} size="large"></lightning-progress-bar>
                </div>
            </template>

            <!-- Completion Message at TOP -->
            <template if:true={isComplete}>
                <div class="slds-m-bottom_medium">
                    <p class="slds-text-color_success slds-m-bottom_x-small">
                        <strong>{progressLabel}</strong>
                    </p>
                    <lightning-progress-bar value="100" size="large"></lightning-progress-bar>
                </div>
            </template>

            <!-- File Input — CSV only, no static resource needed -->
            <lightning-input type="file" label="Upload CSV File" accept=".csv" onchange={handleFileChange} disabled={isProcessing}></lightning-input>

            <template if:true={fileName}>
                <p class="slds-m-top_small">
                    Selected File: <strong>{fileName}</strong>
                    &nbsp;|&nbsp;
                    Total Records: <strong>{totalRecords}</strong>
                </p>
            </template>

            <div class="slds-m-top_medium slds-button-group">
                <lightning-button label="Save" variant="brand" onclick={handleSave} disabled={isUploadDisabled}></lightning-button>

                <lightning-button label="Cancel" variant="neutral" onclick={handleCancel} disabled={isProcessing}></lightning-button>
            </div>
        </div>
    </lightning-card>
</template>
