<template>
  <div class="slds-card slds-p-around_large">
    <header class="slds-media slds-media_center slds-has-text-align_center slds-m-bottom_large">
      <h1 class="slds-text-heading_medium slds-m-bottom_small">Login</h1>
    </header>
    
    <lightning-input type="email"  label="Email Address"  ></lightning-input>

    <!-- <lightning-input 
      name="email" 
      label="Email address"
      type="email"
      required 
      placeholder="Enter your email"
      onchange={handleChange}>
    </lightning-input> -->

    <lightning-input 
      name="password" 
      label="Enter your password"
      type="password"
      required 
      placeholder="Enter your password"
      class="slds-m-top_medium"
      onchange={handleChange}>
    </lightning-input>

    <div class="slds-m-top_medium slds-grid slds-gutters slds-wrap">
      <div class="slds-col slds-size_1-of-2">
        <div class="slds-checkbox">
          <input type="checkbox" id="remember" class="slds-checkbox__input" />
          <label class="slds-checkbox__label" for="remember">
            <span class="slds-checkbox_faux"></span>
            <span class="slds-form-element__label">Remember me</span>
          </label>
        </div>
      </div>
      <div class="slds-col slds-size_1-of-2 slds-text-align_right">
        <lightning-button 
          name="login" 
          label="Login" 
          variant="brand"
          type="submit"
          class="slds-m-top_small"
          onclick={handleLogin}>
        </lightning-button>
      </div>
    </div>
  </div>
</template>
