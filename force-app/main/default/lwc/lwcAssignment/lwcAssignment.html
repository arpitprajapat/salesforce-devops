<template>  
    <lightning-card title="LWC ASSIGNMENT">  
<div style="400px"> 
           <lightning-input type="search" placeholder= " Search by user name" label="Search Account" 
            onchange={handleSearch}></lightning-input>

</div>
        <div style="height: 200px;">  
            <lightning-datatable key-field="id"  
                                data={data}  
                              columns={columns}>  
            </lightning-datatable>  
        </div>  
       
        <lightning-button label="Previous" icon-name="utility:chevronleft" onclick={previousHandler}
                disabled={isPreviousDisable}>
            </lightning-button>

             <lightning-button label="Next" icon-name="utility:chevronright" icon-position="right" onclick={clickHandler}
                disabled={isNextDisable}>
             </lightning-button>

             <lightning-button label="Save Selections" variant="brand" onclick={handleClick}>
        </lightning-button>

    </lightning-card>  
</template>
